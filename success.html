<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Life | Email Confirmed</title>
    <link rel="stylesheet" href="success.css" />
  </head>
  <body>
    <main class="success-page">
      <section class="success-card">
        <div class="icon-wrap">
          <img
            src="https://aaarjpjeydkpwmgohlta.supabase.co/storage/v1/object/public/email-icon/Graduation%20essentials%20in%20black%20and%20white.png"
            alt="Student Life icon"
            class="app-icon"
          />
        </div>

        <span class="status-badge">Email Verified</span>

        <h1>Welcome to <span>Student Life</span></h1>

        <p class="lead">
          Your email has been successfully confirmed.
        </p>

        <p class="subtext">
          Your account is now active and ready to use. You can continue to
          <strong>Student Life</strong> and start organizing your academic life,
          schedule, and goals.
        </p>

        <div class="actions">
          <a href="/login" class="primary-btn">Go to Login</a>
        </div>

        <p class="footer-note">
          You can close this page if you already have the app open.
        </p>
      </section>
    </main>
  </body>
</html>
